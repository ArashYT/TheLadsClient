<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lads Client</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="launcher">
        <button class="launch-button">Launch</button>
    </div>
    <div class="loading-screen hidden">
        <img src="logo.png" alt="Lads Logo" class="logo">
        <div class="spinner"></div>
    </div>
    <div class="kill-banner hidden">
        <span>You killed a player!</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
