plugins {
    id 'net.fabricmc.fabric-loom' version "${loom_version}"
    id 'maven-publish'
}
version = project.mod_version
group = project.maven_group
repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
}
// Merged dev-only JAR: shading libs without fabric.mod.json so Fabric Loader
// doesn't double-register their entrypoints during runClient.
configurations {
    shadedRuntimeLibs
}

def devShadedJar = layout.buildDirectory.file("dev-shaded-all.jar")

tasks.register('createDevShadedJar', Jar) {
    archiveFileName = "dev-shaded-all.jar"
    destinationDirectory = layout.buildDirectory.dir(".")
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    configurations.shadedRuntimeLibs.each { f ->
        from(zipTree(f)) {
            exclude "fabric.mod.json"
            exclude "META-INF/MANIFEST.MF"
            exclude "META-INF/*.SF"
            exclude "META-INF/*.DSA"
            exclude "META-INF/*.RSA"
        }
    }
}

loom {
    accessWidenerPath = file("src/main/resources/scalablelux.accesswidener")
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    implementation "net.fabricmc:fabric-loader:${project.loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
    implementation "club.minnced:java-discord-rpc:2.0.1"
    include "club.minnced:java-discord-rpc:2.0.1"
    implementation "club.minnced:discord-rpc-release:v3.3.0"
    include "club.minnced:discord-rpc-release:v3.3.0"
    compileOnly "com.google.code.findbugs:jsr305:3.0.2"
    compileOnly fileTree(dir: rootProject.file("../The Lads Client Packwiz/mods"), include: "*.jar")
    compileOnly fileTree(dir: file("shading_libs"), include: "**/*.jar")
    compileOnly fileTree(dir: file("temp_unzip"), include: "**/*.jar")
    shadedRuntimeLibs fileTree(dir: file("shading_libs"), include: "**/*.jar")
    shadedRuntimeLibs fileTree(dir: file("temp_unzip"), include: "**/*.jar")
    localRuntime files(devShadedJar) { builtBy 'createDevShadedJar' }
    localRuntime fileTree("C:/The Lads Client/mods") {
        include "*.jar"
        exclude "TheLadsCore-*.jar"
        exclude "modernfix-*.jar"
        exclude "entity_model_features-*.jar"
        exclude "entity_texture_features-*.jar"
    }
    testImplementation "org.junit.jupiter:junit-jupiter-api:5.10.0"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:5.10.0"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
    testImplementation "org.mockito:mockito-core:5.14.2"
    testImplementation "org.mockito:mockito-junit-jupiter:5.14.2"
    testImplementation "net.bytebuddy:byte-buddy:1.15.11"
    testImplementation "net.bytebuddy:byte-buddy-agent:1.15.11"
    testImplementation fileTree(dir: file("shading_libs"), include: "**/*.jar")
    testImplementation fileTree(dir: file("temp_unzip"), include: "**/*.jar")
}
processResources {
    def version = project.version
    inputs.property "version", version
    filesMatching("fabric.mod.json") { expand "version": version }
}
tasks.withType(JavaCompile).configureEach {
    it.options.release = 25
}
// Ensure the merged dev JAR exists before running the client
tasks.named('runClient') {
    dependsOn 'createDevShadedJar'
    if (providers.systemProperty("thelads.benchmark").isPresent()) {
        systemProperty "thelads.benchmark", providers.systemProperty("thelads.benchmark").get()
    } else if (System.getProperty("thelads.benchmark") != null) {
        systemProperty "thelads.benchmark", System.getProperty("thelads.benchmark")
    }
    if (project.hasProperty("thelads.benchmark")) {
        systemProperty "thelads.benchmark", project.property("thelads.benchmark")
    }
    systemProperty "fabric.skipDependencyCheck", "true"
    systemProperty "fabric.skipDependencyChecks", "true"
}
java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.toVersion(25)
    targetCompatibility = JavaVersion.toVersion(25)
}
