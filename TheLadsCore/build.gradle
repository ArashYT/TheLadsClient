publishing {
    publications { create("mavenJava", MavenPublication) { from components.java } }
    repositories {}
}
test {
    useJUnitPlatform()
    systemProperty 'net.bytebuddy.experimental', 'true'
}
tasks.register('deploy', Copy) {
    dependsOn jar
    from jar.archiveFile
    into "C:/The Lads Client/mods"
}
apply from: 'dumpInv.gradle'  
tasks.register('runReflect', JavaExec) {
    mainClass = 'com.thelads.core.ReflectionTest'
    classpath = sourceSets.test.runtimeClasspath
}

task runPayloadTest(type: JavaExec) {
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.thelads.core.client.PayloadTest'
}


