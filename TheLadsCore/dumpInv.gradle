task dumpInv {
    doLast {
        def cl = project.buildscript.classLoader
        def urls = configurations.compileClasspath.files.collect { it.toURI().toURL() }
        def loader = new java.net.URLClassLoader(urls as java.net.URL[], cl)
        try {
            def clazz = loader.loadClass('com.mojang.blaze3d.systems.RenderPass')
            println "SUCCESS: loaded RenderPass"
            clazz.getDeclaredMethods().each { m ->
                if (m.name.contains("draw")) {
                    println "  METHOD: " + m.toString()
                }
            }
        } catch (Exception e) {
            println "FAILED: " + e.toString()
        }
    }
}
